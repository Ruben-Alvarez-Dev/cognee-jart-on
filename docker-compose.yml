# COGNEE-jart-on — Services for Mac Mini (central node)
#
# Services:
#   - litellm:   LLM proxy (enmascara la API real)
#   - postgres:  Shared relational database + pgvector vector store
#   - neo4j:     Shared knowledge graph
#
# Ollama runs NATIVELY on the Mac Mini (not in Docker) for GPU/Metal access.
# Install: brew install ollama
# Pull models: ollama pull nomic-embed-text:latest
#
# Start: docker compose up -d
# Stop:  docker compose down

services:
  # ─────────────────────────────────────────────
  # LiteLLM Proxy — LLM gateway (enmascarador)
  # ─────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: cognee-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./docs/services/litellm_config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Default matches the client's default api_key. Override in the shell
      # (not just .env) so the python client sees the same value.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm}
    restart: unless-stopped
    healthcheck:
      # Image ships no curl; /health needs auth. Use bundled python against
      # the unauthenticated liveliness probe.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # PostgreSQL — Shared relational store
  # ─────────────────────────────────────────────
  postgres:
    # pgvector image = Postgres 16 + the `vector` extension, so this one
    # service backs both the relational store and the shared vector store.
    image: pgvector/pgvector:pg16
    container_name: cognee-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cognee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: cognee_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee -d cognee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Neo4j — Shared knowledge graph
  # ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: cognee-neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "neo4j status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Vectors live in the Postgres service above via pgvector — no separate
  # vector container is needed for P2P.

volumes:
  postgres_data:
  neo4j_data:
