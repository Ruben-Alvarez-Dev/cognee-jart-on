# LiteLLM Proxy Configuration for COGNEE-jart-on
#
# Provider: Google Gemini (latest models)
# Budget: Hard limit enforced via virtual keys

model_list:
  # Primary: Gemini 3.5 Flash (latest, best structured output)
  - model_name: cognee-llm
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GEMINI_API_KEY
      rpm: 60
      temperature: 0.0
    model_info:
      id: gemini-3.5-flash-primary

  # Fallback: Gemini 3.1 Flash-Lite (cheapest)
  - model_name: cognee-llm
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GEMINI_API_KEY
      rpm: 120
      order: 2
    model_info:
      id: gemini-3.1-flash-lite-fallback

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 120
  allowed_fails: 3

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
